<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Contact the Tooleva team for support, feature requests, or business inquiries." />
    <title>Contact Us | Tooleva</title>
  <link rel="stylesheet" crossorigin href="/assets/style-DCa9Tmzr.css">
    <script type="module">
        import { initThemeToggle } from '../../src/js/theme.js';
        document.addEventListener('DOMContentLoaded', () => initThemeToggle('theme-toggle'));
    </script>
</head>
<body class="bg-bg-light dark:bg-bg-dark text-text-light dark:text-text-dark font-sans min-h-screen flex flex-col transition-colors duration-300">
    <header class="glass-nav py-4">
        <div class="max-w-7xl mx-auto px-4 flex justify-between items-center">
            <a href="/" class="text-2xl font-bold tracking-tight text-primary-600">Tooleva</a>
            <nav class="hidden md:flex space-x-8">
                <a href="/tools/pdf-tools/index.html" class="hover:text-primary-600 transition-colors">PDF Tools</a>
                <a href="/tools/image-tools/index.html" class="hover:text-primary-600 transition-colors">Image Tools</a>
                <a href="/tools/calculators/index.html" class="hover:text-primary-600 transition-colors">Calculators</a>
                <button id="theme-toggle" class="p-2 ml-4 rounded-xl bg-gray-100 dark:bg-slate-800 text-gray-600 dark:text-gray-300 hover:bg-gray-200 dark:hover:bg-slate-700 transition-colors focus:outline-none"></button>
            </nav>
        </div>
    </header>

    <main class="flex-grow py-16 px-4">
        <div class="max-w-3xl mx-auto card p-8 sm:p-12">
            <h1 class="text-4xl font-extrabold text-gray-900 dark:text-white mb-4 text-center">Contact Us</h1>
            <p class="text-center text-gray-600 mb-8">Have a question or a feature request? We'd love to hear from you.</p>
            
            <form class="space-y-6" onsubmit="event.preventDefault(); alert('Message sent successfully!');">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Name</label>
                    <input type="text" required class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-primary-500" />
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                    <input type="email" required class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-primary-500" />
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Message</label>
                    <textarea required rows="5" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-primary-500"></textarea>
                </div>
                <button type="submit" class="btn-primary w-full py-4 text-lg">Send Message</button>
            </form>
        </div>
    </main>
    <footer class="bg-gray-900 text-gray-300 py-12 border-t border-gray-800 mt-auto"><div class="text-center text-sm">&copy; 2026 Tooleva.</div></footer>
</body>
</html>
