<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Calculate percentages instantly. Find out what percent X is of Y, or the percentage increase." />
    <title>Percentage Calculator | Tooleva</title>
  <script type="module" crossorigin src="/assets/percentageCalculator-BC2n-oWX.js"></script>
  <link rel="modulepreload" crossorigin href="/assets/modulepreload-polyfill-B5Qt9EMX.js">
  <link rel="modulepreload" crossorigin href="/assets/utils-XdKX-3K2.js">
  <link rel="stylesheet" crossorigin href="/assets/style-DCa9Tmzr.css">
    <script type="module">
        import { initThemeToggle } from '../../../src/js/theme.js';
        document.addEventListener('DOMContentLoaded', () => initThemeToggle('theme-toggle'));
    </script>
</head>
<body class="bg-bg-light dark:bg-bg-dark text-text-light dark:text-text-dark font-sans min-h-screen flex flex-col transition-colors duration-300">
    <header class="glass-nav py-4">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex justify-between items-center">
            <a href="/" class="text-2xl font-bold tracking-tight text-primary-600 flex items-center gap-2">Tooleva</a>
            <nav class="hidden md:flex space-x-8 text-sm font-medium">
                <a href="/tools/pdf-tools/index.html" class="hover:text-primary-600 transition-colors">PDF Tools</a>
                <a href="/tools/image-tools/index.html" class="hover:text-primary-600 transition-colors">Image Tools</a>
                <a href="/tools/calculators/index.html" class="text-primary-600 transition-colors">Calculators</a>
                <button id="theme-toggle" class="p-2 ml-4 rounded-xl bg-gray-100 dark:bg-slate-800 text-gray-600 dark:text-gray-300 hover:bg-gray-200 dark:hover:bg-slate-700 transition-colors focus:outline-none"></button>
            </nav>
        </div>
    </header>

    <main class="flex-grow py-12 px-4 sm:px-6 lg:px-8 max-w-4xl mx-auto w-full">
        <h1 class="text-3xl font-extrabold text-center mb-2">Percentage Calculator</h1>
        <p class="text-center text-gray-600 mb-8">Fast, everyday percentage calculations.</p>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <!-- Type 1 -->
            <div class="card p-6 border-t-4 border-t-primary-500">
                <h3 class="font-bold text-lg mb-4 text-gray-900">What is P% of X?</h3>
                <div class="flex items-center gap-2 mb-4">
                    <span class="text-gray-600">What is</span>
                    <input type="number" id="t1-p" class="w-20 px-3 py-2 border rounded focus:ring-primary-500 font-medium" placeholder="20" />
                    <span class="text-gray-600">% of</span>
                    <input type="number" id="t1-x" class="w-full px-3 py-2 border rounded focus:ring-primary-500 font-medium" placeholder="150" />
                </div>
                <div class="text-right">
                    <span class="text-3xl font-bold text-primary-600" id="t1-res">?</span>
                </div>
            </div>

            <!-- Type 2 -->
            <div class="card p-6 border-t-4 border-t-primary-500">
                <h3 class="font-bold text-lg mb-4 text-gray-900">X is what percent of Y?</h3>
                <div class="flex items-center gap-2 mb-4">
                    <input type="number" id="t2-x" class="w-full px-3 py-2 border rounded focus:ring-primary-500 font-medium" placeholder="30" />
                    <span class="text-gray-600 w-auto whitespace-nowrap">is what % of</span>
                    <input type="number" id="t2-y" class="w-full px-3 py-2 border rounded focus:ring-primary-500 font-medium" placeholder="150" />
                </div>
                <div class="text-right">
                    <span class="text-3xl font-bold text-primary-600" id="t2-res">?</span>
                </div>
            </div>

            <!-- Type 3 -->
            <div class="card p-6 md:col-span-2 border-t-4 border-t-primary-500">
                <h3 class="font-bold text-lg mb-4 text-gray-900">Percentage Increase/Decrease</h3>
                <div class="flex flex-col sm:flex-row items-center gap-4 mb-4">
                    <span class="text-gray-600 whitespace-nowrap">Change from</span>
                    <input type="number" id="t3-x" class="w-full px-3 py-2 border rounded focus:ring-primary-500 font-medium" placeholder="100" />
                    <span class="text-gray-600">to</span>
                    <input type="number" id="t3-y" class="w-full px-3 py-2 border rounded focus:ring-primary-500 font-medium" placeholder="125" />
                </div>
                <div class="text-center sm:text-right mt-4 sm:mt-0">
                    <span class="text-3xl font-bold text-primary-600" id="t3-res">?</span>
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-gray-900 text-gray-300 py-12 border-t border-gray-800 mt-auto">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center text-sm text-gray-500">
            &copy; 2026 Tooleva. All rights reserved.
        </div>
    </footer>
</body>
</html>
