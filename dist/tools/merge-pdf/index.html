<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Merge multiple PDF files into one online for free. Combine PDFs in your browser." />
    <title>Merge PDF | Tooleva</title>
  <script type="module" crossorigin src="/assets/mergePdf-DX01Zeq_.js"></script>
  <link rel="modulepreload" crossorigin href="/assets/modulepreload-polyfill-B5Qt9EMX.js">
  <link rel="modulepreload" crossorigin href="/assets/_commonjsHelpers-Cpj98o6Y.js">
  <link rel="modulepreload" crossorigin href="/assets/PDFButton-Ca75raqr.js">
  <link rel="modulepreload" crossorigin href="/assets/dropzone-CFH8ReNc.js">
  <link rel="modulepreload" crossorigin href="/assets/utils-XdKX-3K2.js">
  <link rel="stylesheet" crossorigin href="/assets/style-DCa9Tmzr.css">
    <script type="module">
        import { initThemeToggle } from '../../../src/js/theme.js';
        document.addEventListener('DOMContentLoaded', () => initThemeToggle('theme-toggle'));
    </script>
</head>
<body class="bg-bg-light dark:bg-bg-dark text-text-light dark:text-text-dark font-sans min-h-screen flex flex-col transition-colors duration-300">
    <header class="glass-nav py-4">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex justify-between items-center">
            <a href="/" class="text-2xl font-bold tracking-tight text-primary-600 flex items-center gap-2">Tooleva</a>
            <nav class="hidden md:flex space-x-8 text-sm font-medium">
                <a href="/tools/pdf-tools/index.html" class="text-primary-600 transition-colors">PDF Tools</a>
                <a href="/tools/image-tools/index.html" class="hover:text-primary-600 transition-colors">Image Tools</a>
                <a href="/tools/calculators/index.html" class="hover:text-primary-600 transition-colors">Calculators</a>
                <button id="theme-toggle" class="p-2 ml-4 rounded-xl bg-gray-100 dark:bg-slate-800 text-gray-600 dark:text-gray-300 hover:bg-gray-200 dark:hover:bg-slate-700 transition-colors focus:outline-none"></button>
            </nav>
        </div>
    </header>

    <main class="flex-grow py-12 px-4 sm:px-6 lg:px-8 max-w-4xl mx-auto w-full">
        <h1 class="text-3xl font-extrabold text-center mb-2">Merge PDF</h1>
        <p class="text-center text-gray-600 mb-8">Combine multiple PDFs into a single file quickly without uploading to a server.</p>

        <div class="card p-8 mb-8">
            <div id="drop-zone" class="drop-zone mb-6">
                <svg class="w-12 h-12 text-gray-400 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7v8a2 2 0 002 2h6M8 7V5a2 2 0 012-2h4.586a1 1 0 01.707.293l4.414 4.414a1 1 0 01.293.707V15a2 2 0 01-2 2h-2M8 7H6a2 2 0 00-2 2v10a2 2 0 002 2h8a2 2 0 002-2v-2"></path></svg>
                <p class="text-lg font-medium text-gray-700">Drag & Drop multiple PDFs here</p>
                <p class="text-sm text-gray-500 mt-1">or click to browse</p>
            </div>
            
            <input type="file" id="file-input" class="hidden" accept="application/pdf" multiple />

            <!-- Selected Files Area -->
            <div id="file-list" class="space-y-3 mb-6 hidden">
                <!-- Javascript will populate this list -->
            </div>

            <!-- Action Area -->
            <div class="flex flex-col sm:flex-row gap-4 justify-center">
                <button id="btn-add-more" class="btn-secondary hidden" onclick="document.getElementById('file-input').click()">Add More Files</button>
                <button id="btn-merge" class="btn-primary px-12 py-4 shadow-lg disabled:opacity-50 disabled:cursor-not-allowed hidden">Merge PDFs</button>
            </div>

            <!-- Loader -->
            <div id="loader" class="hidden flex flex-col items-center justify-center py-8 text-center text-gray-600">
                <svg class="animate-spin h-10 w-10 text-primary-600 mb-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                <p class="text-gray-600 font-medium">Merging documents... this may take a moment</p>
            </div>
        </div>

        <!-- Result -->
        <div id="result-area" class="hidden card bg-green-50 border-green-200 p-8 text-center animate-fade-in">
            <div class="w-16 h-16 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto mb-4">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
            </div>
            <h3 class="text-2xl font-bold text-gray-900 mb-2">Merge Complete!</h3>
            <p class="text-green-700 font-medium mb-6">Your documents were successfully combined.</p>
            <div class="flex flex-col sm:flex-row gap-4 justify-center">
                <button id="btn-restart" class="btn-secondary py-3">Merge More Files</button>
                <button id="btn-download" class="btn-primary bg-green-600 hover:bg-green-700 text-lg px-8 py-3">Download Merged PDF</button>
            </div>
        </div>
    </main>

</body>
</html>
