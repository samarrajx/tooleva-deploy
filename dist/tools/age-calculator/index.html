<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Calculate your exact age in years, months, and days using our free online age calculator." />
    <title>Age Calculator | Tooleva</title>
  <script type="module" crossorigin src="/assets/ageCalculator-CRSVZtop.js"></script>
  <link rel="modulepreload" crossorigin href="/assets/modulepreload-polyfill-B5Qt9EMX.js">
  <link rel="modulepreload" crossorigin href="/assets/utils-XdKX-3K2.js">
  <link rel="stylesheet" crossorigin href="/assets/style-DCa9Tmzr.css">
    <script type="module">
        import { initThemeToggle } from '../../../src/js/theme.js';
        document.addEventListener('DOMContentLoaded', () => initThemeToggle('theme-toggle'));
    </script>
</head>
<body class="bg-bg-light dark:bg-bg-dark text-text-light dark:text-text-dark font-sans min-h-screen flex flex-col transition-colors duration-300">
    <header class="glass-nav py-4">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex justify-between items-center">
            <a href="/" class="text-2xl font-bold tracking-tight text-primary-600 flex items-center gap-2">Tooleva</a>
            <nav class="hidden md:flex space-x-8 text-sm font-medium">
                <a href="/tools/pdf-tools/index.html" class="hover:text-primary-600 transition-colors">PDF Tools</a>
                <a href="/tools/image-tools/index.html" class="hover:text-primary-600 transition-colors">Image Tools</a>
                <a href="/tools/calculators/index.html" class="text-primary-600 transition-colors">Calculators</a>
                <button id="theme-toggle" class="p-2 ml-4 rounded-xl bg-gray-100 dark:bg-slate-800 text-gray-600 dark:text-gray-300 hover:bg-gray-200 dark:hover:bg-slate-700 transition-colors focus:outline-none"></button>
            </nav>
        </div>
    </header>

    <main class="flex-grow py-12 px-4 sm:px-6 lg:px-8 max-w-3xl mx-auto w-full">
        <h1 class="text-3xl font-extrabold text-center mb-2">Age Calculator</h1>
        <p class="text-center text-gray-600 mb-8">Find out your exact age down to the days instantly.</p>

        <div class="card p-8 mb-8">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Date of Birth</label>
                    <input type="date" id="dob" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-primary-500 focus:border-primary-500" />
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Calculate Age At</label>
                    <input type="date" id="target-date" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-primary-500 focus:border-primary-500" />
                </div>
            </div>

            <div class="flex justify-center">
                <button id="btn-calculate" class="btn-primary px-12 py-4 shadow-lg text-lg">Calculate Age</button>
            </div>
        </div>

        <div id="result-area" class="hidden animate-fade-in space-y-4">
            <div class="card bg-indigo-50 border-indigo-200 p-8 text-center">
                <h3 class="text-xl text-indigo-900 font-semibold mb-2">You are:</h3>
                <p id="result-main" class="text-4xl font-extrabold text-indigo-700 mb-4"></p>
                
                <div class="grid grid-cols-2 shadow-sm rounded-lg overflow-hidden border border-indigo-100 bg-white md:grid-cols-4 gap-px text-center">
                    <div class="p-4 bg-indigo-50/50">
                        <p class="text-sm text-gray-500 mb-1">Total Months</p>
                        <p id="total-months" class="font-bold text-gray-900 text-xl"></p>
                    </div>
                    <div class="p-4 bg-indigo-50/50">
                        <p class="text-sm text-gray-500 mb-1">Total Weeks</p>
                        <p id="total-weeks" class="font-bold text-gray-900 text-xl"></p>
                    </div>
                    <div class="p-4 bg-indigo-50/50">
                        <p class="text-sm text-gray-500 mb-1">Total Days</p>
                        <p id="total-days" class="font-bold text-gray-900 text-xl"></p>
                    </div>
                    <div class="p-4 bg-indigo-50/50">
                        <p class="text-sm text-gray-500 mb-1">Next Birthday</p>
                        <p id="next-birthday" class="font-bold text-gray-900 text-xl"></p>
                    </div>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
