<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Convert PDF to JPG free online. Extract all pages from a PDF as high-quality images." />
    <title>PDF to JPG | Tooleva</title>
  <script type="module" crossorigin src="/assets/pdfToJpg-CR76-Lc7.js"></script>
  <link rel="modulepreload" crossorigin href="/assets/modulepreload-polyfill-B5Qt9EMX.js">
  <link rel="modulepreload" crossorigin href="/assets/_commonjsHelpers-Cpj98o6Y.js">
  <link rel="modulepreload" crossorigin href="/assets/jszip.min-CnOPjhWj.js">
  <link rel="modulepreload" crossorigin href="/assets/dropzone-CFH8ReNc.js">
  <link rel="modulepreload" crossorigin href="/assets/utils-XdKX-3K2.js">
  <link rel="stylesheet" crossorigin href="/assets/style-DCa9Tmzr.css">
    <script type="module">
        import { initThemeToggle } from '../../../src/js/theme.js';
        document.addEventListener('DOMContentLoaded', () => initThemeToggle('theme-toggle'));
    </script>
</head>
<body class="bg-bg-light dark:bg-bg-dark text-text-light dark:text-text-dark font-sans min-h-screen flex flex-col transition-colors duration-300">
    <header class="glass-nav py-4">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex justify-between items-center">
            <a href="/" class="text-2xl font-bold tracking-tight text-primary-600 flex items-center gap-2">Tooleva</a>
            <nav class="hidden md:flex space-x-8 text-sm font-medium">
                <a href="/tools/pdf-tools/index.html" class="text-primary-600 transition-colors">PDF Tools</a>
                <a href="/tools/image-tools/index.html" class="hover:text-primary-600 transition-colors">Image Tools</a>
                <a href="/tools/calculators/index.html" class="hover:text-primary-600 transition-colors">Calculators</a>
                <button id="theme-toggle" class="p-2 ml-4 rounded-xl bg-gray-100 dark:bg-slate-800 text-gray-600 dark:text-gray-300 hover:bg-gray-200 dark:hover:bg-slate-700 transition-colors focus:outline-none"></button>
            </nav>
        </div>
    </header>

    <main class="flex-grow py-12 px-4 sm:px-6 lg:px-8 max-w-4xl mx-auto w-full">
        <h1 class="text-3xl font-extrabold text-center mb-2">Convert PDF to JPG</h1>
        <p class="text-center text-gray-600 mb-8">Transform every PDF page into a high-quality JPG image.</p>

        <div class="card p-8 mb-8">
            <div id="drop-zone" class="drop-zone mb-6">
                <svg class="w-12 h-12 text-gray-400 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                <p class="text-lg font-medium text-gray-700">Drag & Drop your PDF here</p>
                <p class="text-sm text-gray-500 mt-1">Maximum 50 pages recommended</p>
            </div>
            
            <input type="file" id="file-input" class="hidden" accept="application/pdf" />

            <!-- Selected File -->
            <div id="file-info" class="hidden bg-white rounded-lg p-4 border border-gray-200 mb-6 flex items-center justify-between shadow-sm">
                <div class="flex items-center gap-3">
                    <svg class="w-8 h-8 text-red-500 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M4 4a2 2 0 012-2h4.586A2 2 0 0112 2.586L15.414 6A2 2 0 0116 7.414V16a2 2 0 01-2 2H6a2 2 0 01-2-2V4zm2 6a1 1 0 011-1h6a1 1 0 110 2H7a1 1 0 01-1-1zm1 3a1 1 0 100 2h6a1 1 0 100-2H7z" clip-rule="evenodd"></path></svg>
                    <div>
                        <p id="file-name" class="font-medium text-gray-900"></p>
                    </div>
                </div>
                <button id="btn-remove" class="text-gray-400 hover:text-red-500 p-2"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg></button>
            </div>

            <!-- Action Area -->
            <div class="flex flex-col sm:flex-row gap-4 justify-center">
                <button id="btn-convert" class="btn-primary w-full sm:w-auto text-lg px-12 py-4 shadow-lg hidden">Convert to JPG</button>
            </div>

            <!-- Loader & Progress -->
            <div id="loader" class="hidden flex flex-col items-center justify-center py-8">
                <svg class="animate-spin h-10 w-10 text-primary-600 mb-4" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                <p id="progress-text" class="text-gray-600 font-medium tracking-wide">Rendering pages...</p>
            </div>
        </div>

        <!-- Result -->
        <div id="result-area" class="hidden card bg-green-50 border-green-200 p-8 text-center animate-fade-in">
            <h3 class="text-2xl font-bold text-gray-900 mb-2">Conversion Complete!</h3>
            <p class="text-green-700 font-medium mb-6">All pages have been transformed to high-quality JPGs inside a ZIP.</p>
            <button id="btn-download" class="btn-primary bg-green-600 border-none hover:bg-green-700 text-lg px-8 py-3">Download ZIP</button>
        </div>
        
        <canvas id="render-canvas" class="hidden"></canvas>
    </main>
</body>
</html>
