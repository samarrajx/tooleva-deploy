<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Resize an image instantly online for free. Change dimensions by pixels." />
    <title>Resize Image | Tooleva</title>
  <script type="module" crossorigin src="/assets/resizeImage-vVfZiIsp.js"></script>
  <link rel="modulepreload" crossorigin href="/assets/modulepreload-polyfill-B5Qt9EMX.js">
  <link rel="modulepreload" crossorigin href="/assets/dropzone-CFH8ReNc.js">
  <link rel="modulepreload" crossorigin href="/assets/utils-XdKX-3K2.js">
  <link rel="stylesheet" crossorigin href="/assets/style-DCa9Tmzr.css">
    <script type="module">
        import { initThemeToggle } from '../../../src/js/theme.js';
        document.addEventListener('DOMContentLoaded', () => initThemeToggle('theme-toggle'));
    </script>
</head>
<body class="bg-bg-light dark:bg-bg-dark text-text-light dark:text-text-dark font-sans min-h-screen flex flex-col transition-colors duration-300">
    <header class="glass-nav py-4">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex justify-between items-center">
            <a href="/" class="text-2xl font-bold tracking-tight text-primary-600 flex items-center gap-2">Tooleva</a>
            <nav class="hidden md:flex space-x-8 text-sm font-medium">
                <a href="/tools/pdf-tools/index.html" class="hover:text-primary-600 transition-colors">PDF Tools</a>
                <a href="/tools/image-tools/index.html" class="text-primary-600 transition-colors">Image Tools</a>
                <a href="/tools/calculators/index.html" class="hover:text-primary-600 transition-colors">Calculators</a>
                <button id="theme-toggle" class="p-2 ml-4 rounded-xl bg-gray-100 dark:bg-slate-800 text-gray-600 dark:text-gray-300 hover:bg-gray-200 dark:hover:bg-slate-700 transition-colors focus:outline-none"></button>
            </nav>
        </div>
    </header>

    <main class="flex-grow py-12 px-4 sm:px-6 lg:px-8 max-w-4xl mx-auto w-full">
        <h1 class="text-3xl font-extrabold text-center mb-2">Resize Image</h1>
        <p class="text-center text-gray-600 mb-8">Change the dimensions of your image quickly in the browser.</p>

        <div class="card p-8 mb-8">
            <div id="drop-zone" class="drop-zone mb-6">
                <svg class="w-12 h-12 text-gray-400 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4"></path></svg>
                <p class="text-lg font-medium text-gray-700">Drag & Drop an image to resize</p>
                <p class="text-sm text-gray-500 mt-1">Accepts JPG, PNG, WEBP</p>
            </div>
            
            <input type="file" id="file-input" class="hidden" accept="image/*" />

            <!-- Configuration Area -->
            <div id="config-area" class="hidden animate-fade-in">
                <div class="bg-white rounded-lg p-4 border border-gray-200 mb-6 flex items-center justify-between shadow-sm">
                    <div class="flex items-center gap-3">
                        <img id="image-preview" class="w-16 h-16 object-contain rounded border border-gray-200" />
                        <div>
                            <p id="file-name" class="font-medium text-gray-900 truncate w-32 sm:w-64"></p>
                            <p id="original-dimensions" class="text-sm text-gray-500">0 x 0 px</p>
                        </div>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">New Width (px)</label>
                        <input type="number" id="input-width" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-primary-500 focus:border-primary-500" />
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">New Height (px)</label>
                        <input type="number" id="input-height" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-primary-500 focus:border-primary-500" />
                    </div>
                    <div class="md:col-span-2 flex items-center">
                        <input type="checkbox" id="maintain-ratio" checked class="w-4 h-4 text-primary-600 border-gray-300 rounded focus:ring-primary-500">
                        <label for="maintain-ratio" class="ml-2 block text-sm text-gray-900">Maintain Aspect Ratio</label>
                    </div>
                </div>

                <div class="flex flex-col sm:flex-row gap-4 justify-center">
                    <button id="btn-cancel" class="btn-secondary">Cancel</button>
                    <button id="btn-resize" class="btn-primary px-12 py-4 shadow-lg text-lg">Resize & Download</button>
                </div>
            </div>
        </div>
        
        <canvas id="render-canvas" class="hidden"></canvas>
    </main>
</body>
</html>
