<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Convert JPG to PNG free online. Transcode image formats quickly and securely." />
    <title>JPG to PNG | Tooleva</title>
  <script type="module" crossorigin src="/assets/jpgToPng-B4QS4RAQ.js"></script>
  <link rel="modulepreload" crossorigin href="/assets/modulepreload-polyfill-B5Qt9EMX.js">
  <link rel="modulepreload" crossorigin href="/assets/dropzone-CFH8ReNc.js">
  <link rel="modulepreload" crossorigin href="/assets/utils-XdKX-3K2.js">
  <link rel="stylesheet" crossorigin href="/assets/style-DCa9Tmzr.css">
    <script type="module">
        import { initThemeToggle } from '../../../src/js/theme.js';
        document.addEventListener('DOMContentLoaded', () => initThemeToggle('theme-toggle'));
    </script>
</head>
<body class="bg-bg-light dark:bg-bg-dark text-text-light dark:text-text-dark font-sans min-h-screen flex flex-col transition-colors duration-300">
    <header class="glass-nav py-4">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex justify-between items-center">
            <a href="/" class="text-2xl font-bold tracking-tight text-primary-600 flex items-center gap-2">Tooleva</a>
            <nav class="hidden md:flex space-x-8 text-sm font-medium">
                <a href="/tools/pdf-tools/index.html" class="hover:text-primary-600 transition-colors">PDF Tools</a>
                <a href="/tools/image-tools/index.html" class="text-primary-600 transition-colors">Image Tools</a>
                <a href="/tools/calculators/index.html" class="hover:text-primary-600 transition-colors">Calculators</a>
                <button id="theme-toggle" class="p-2 ml-4 rounded-xl bg-gray-100 dark:bg-slate-800 text-gray-600 dark:text-gray-300 hover:bg-gray-200 dark:hover:bg-slate-700 transition-colors focus:outline-none"></button>
            </nav>
        </div>
    </header>

    <main class="flex-grow py-12 px-4 sm:px-6 lg:px-8 max-w-4xl mx-auto w-full">
        <h1 class="text-3xl font-extrabold text-center mb-2">JPG to PNG</h1>
        <p class="text-center text-gray-600 mb-8">Change image formats instantly in your browser.</p>

        <div class="card p-8 mb-8">
            <div id="drop-zone" class="drop-zone mb-6">
                <!-- Icon -->
                <svg class="w-12 h-12 text-gray-400 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"></path></svg>
                <p class="text-lg font-medium text-gray-700">Drag & Drop your JPG image</p>
            </div>
            
            <input type="file" id="file-input" class="hidden" accept="image/jpeg, image/jpg, image/webp" />

            <!-- Selected File -->
            <div id="file-info" class="hidden bg-white rounded-lg p-4 border border-gray-200 mb-6 flex items-center justify-between shadow-sm">
                <div class="flex items-center gap-3">
                    <img id="image-preview" class="w-12 h-12 object-cover rounded border border-gray-200" />
                    <p id="file-name" class="font-medium text-gray-900 truncate w-32 sm:w-64"></p>
                </div>
                <button id="btn-remove" class="text-gray-400 hover:text-red-500 p-2"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg></button>
            </div>

            <div class="flex flex-col sm:flex-row gap-4 justify-center">
                <button id="btn-convert" class="btn-primary w-full sm:w-auto text-lg px-12 py-4 shadow-lg hidden">Convert to PNG</button>
            </div>
        </div>
        
        <canvas id="render-canvas" class="hidden"></canvas>
    </main>
</body>
</html>
